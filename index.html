<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard de Densidade de Mobilidade</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <nav class="anchor-nav">
        <button id="toggle-sidebar" title="Minimizar Menu">☰</button>
        <div class="nav-content" id="dynamic-nav">
            <span>Frotas</span>
        </div>
        <div class="nav-content" id="matrix-nav">
            <span>Matriz</span>
            <div class="matrix-tabs">
                <button class="matrix-tab" data-hash="#matriz-yellow" id="btn-matriz-yellow">Matriz Yellow</button>
                <button class="matrix-tab" data-hash="#matriz-green" id="btn-matriz-green">Matriz Green</button>
            </div>
        </div>
        
        <a href="#main-top" class="back-to-top">Voltar ao Topo</a>
    </nav>

    <div class="main-container">
        <!-- Visão Geral Comparativa (Fixa) -->
        <div id="overview-container" class="overview-section">
            <!-- Inserido via JavaScript -->
        </div>
        
        <div class="timeline-wrapper" id="timeline-container">
            <!-- Conteúdo Dinâmico Inserido via main.js -->
        </div>
    </div>
    <script type="module" src="src/main.js"></script>
</body>
</html>
